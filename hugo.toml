# ===
# === Hugo Configure
# ===
# The absolute URL of your published site
baseURL = 'https://scholar7r.cn/'

# Language code in html tag
languageCode = 'zh-CN'

# Site title
title = 'Inkwell'

# Theme for whole site
theme = 'inkwell-bulma-v1'

# Auto-detect Chinese / Japanese / Korean Languages in the content
hasCJKLanguage = true

# Content without language indicator will default to this language
defaultContentLanguage = 'zh'

# Delete the hugo meta information from head
disableHugoGeneratorInject = true

# Articles per page
paginate = 8

# Summary length
summaryLength = 70

# Copyright which will be shown in the left of footer
copyright = '<a class="copyright" href="http://beian.miit.gov.cn/">鄂 ICP 备 2023000687 号</a>'

[taxonomies]
archive = 'archives'
category = 'categories'

[markup.goldmark.renderer]
unsafe = true

[markup.highlight]
style = 'base16-snazzy'

# ===
# === Basics
# ===
[params]
favicon = '/favicon.png'
author = 'Scholar 7r'
keywords = ['开发', '技术', '生活', '博客', 'Hugo']
description = 'Scholar 7r 在日常开发中的知识汇总和分享。'

# ===
# === Header
# ===
[params.header]
logoText = 'Inkwell'
links = [
  { label = '归档', link = '/archives' },
  { label = '分类', link = '/categories' }
]

# ===
# === Article
# ===
[params.hero]
title = 'Scholar 7r 知识库'
subtitle = '喧闹任其喧闹，自有我自为之，我自风情万种，与世无争。'

[params.hero.custom]
enableCustomButton = false
label = '阅读'
link = '/about'

[params.article]
timeFormat = '2006 年 01 月 02 日'

[params.toc]
enableSmartTOC = true

[params.footer]
# Inkwell allow you to use icons from font awesome, before you have to make sure that there are font awesome in vendor
social = [
  { icon = 'fab fa-x-twitter', link = 'https://x.com/scholar7r/' },
  { icon = 'fab fa-github', link = 'https://github.com/scholar7r/' },
  { icon = 'fab fa-creative-commons', link = 'https://creativecommons.org/licenses/by-sa/4.0/' }
]

# ===
# === Vendor
# ===
# BEFORE YOU EDIT IT, PLEASE MAKE SURE THAT YOU KNOW WHAT YOU ARE DOING
# Register the required static resource files (including your custom ones) in the vendor block, Inkwell will
# automatically pull these resource files and render them
[params.vendor]
scripts = [
  'https://kit.fontawesome.com/823a96a1b9.js',
  '/js/navbar.js'
]
